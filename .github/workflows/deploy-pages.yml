# サイト(リポジトリルートに生成)を GitHub Pages にデプロイする。
# 日次の自動更新では daily-agent.yml が自分でデプロイまで行う
# (GITHUB_TOKEN による push は他のワークフローをトリガーしないため)。
#
# 注意: Pages が「ブランチ配信」設定の場合、GitHub 側の "pages build and deployment" と
# 同一コミットのデプロイを取り合って片方が失敗する。ブランチ配信でもサイトはルートに
# 生成されるため配信内容は同じ。そのためデプロイ失敗はワークフロー失敗にしない
# (continue-on-error)。Settings → Pages → Source を "GitHub Actions" にすると競合は消える。

name: deploy-pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "digest.html"
      - "archive.html"
      - "growth.html"
      - "runs.html"
      - "404.html"
      - "style.css"
      - "feed.xml"
      - "graph.json"
      - "archive/**"
      - "assets/**"
      - ".github/workflows/deploy-pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # ブランチ配信(legacy Jekyll)で有効化されていると Actions 配信と競合するため、
      # 配信方式を workflow (GitHub Actions) に切り替える。すでに workflow なら no-op。
      - name: 配信方式を GitHub Actions に切り替え
        run: |
          curl -sS -X PUT \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pages" \
            -d '{"build_type":"workflow"}' \
            -w "HTTP %{http_code}\n" || echo "::warning::切り替えAPIが失敗(Settings → Pages → Source: GitHub Actions を手動で選択してください)"

      - name: Pages を設定(未有効なら自動で有効化)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: サイトをアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: デプロイ
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: 再試行前に待機
        if: steps.deployment.outcome == 'failure'
        run: sleep 20

      # 1回目が一時的エラー("try again later")で失敗した場合の再試行。ここで失敗したら赤く落とす
      - name: デプロイ(再試行)
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
