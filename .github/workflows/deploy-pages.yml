# docs/ を GitHub Pages にデプロイする(手動実行 or docs/ を直接編集して push したとき用)。
# 日次の自動更新では daily-agent.yml が自分でデプロイまで行う
# (GITHUB_TOKEN による push は他のワークフローをトリガーしないため)。

name: deploy-pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["docs/**"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Pages を設定(未有効なら自動で有効化)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: サイトをアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: デプロイ
        id: deployment
        uses: actions/deploy-pages@v4
